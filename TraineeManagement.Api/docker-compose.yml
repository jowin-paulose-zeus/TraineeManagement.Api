services:
  redis:
    image: docker-registry-002.zeuslearning.com/zeuslearning/redis
    container_name: trainee-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: docker-registry-002.zeuslearning.com/zeuslearning/rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped    

  mysql:
    image: docker-registry-002.zeuslearning.com/zeuslearning/mysql
    container_name: trainee-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: TraineeManagement
      MYSQL_USER: traineeuser
      MYSQL_PASSWORD: trainee123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:

